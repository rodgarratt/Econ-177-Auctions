  }

  .badge {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;

    border: 1px solid var(--accent);
    padding: 4px 10px;
    border-radius: 2px;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 4px;

  .container {

    margin: 0 auto;
  }

  .year-nav {

    gap: 4px;
    margin-bottom: 28px;
    flex-wrap: wrap;

    letter-spacing: 0.05em;
    padding: 7px 18px;

    border: 1px solid var(--border);
    color: var(--muted);

    border-radius: 2px;

    border-color: rgba(255,255,255,0.2);

  }

  .year-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0c10;

    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 16px 20px;
    position: relative;
  }

  .chart-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 8px;
    flex-wrap: wrap;
    gap: 8px;

  .chart-year-label {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--accent);
    font-weight: 600;
  }

  .chart-note {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;

    display: block;
  }

  .axis text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    fill: var(--muted);
  }

  .axis path, .axis line {
    stroke: var(--border);
  }

  .grid line {
    stroke: rgba(255,255,255,0.04);
    stroke-dasharray: 3,3;
  }

  .yield-line {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.85;
    transition: opacity 0.2s;
  }

  .yield-line:hover {
    opacity: 1;
    stroke-width: 2.5;

    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    margin-top: 20px;
    padding: 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;

    align-items: center;
    gap: 7px;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s;

    width: 20px;
    height: 2px;
    border-radius: 1px;
    flex-shrink: 0;

    position: fixed;
    background: #1a1f2a;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    font-size: 11px;
    pointer-events: none;

let currentYear = 2024;
let hiddenMonths = new Set();

function getYearData(year) {
  return DATA[year] || [];
}

function buildYearNav() {
  const nav = document.getElementById('yearNav');
  [2020,2021,2022,2023,2024,2025,2026].forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'year-btn' + (y === currentYear ? ' active' : '');
    btn.textContent = y;
    btn.onclick = () => selectYear(y);
    nav.appendChild(btn);
  });
}

function selectYear(year) {
  currentYear = year;
  hiddenMonths.clear();
  document.querySelectorAll('.year-btn').forEach((b,i) => {
    b.classList.toggle('active', [2020,2021,2022,2023,2024,2025,2026][i] === year);
  });
  document.getElementById('chartYearLabel').textContent = year;
  document.getElementById('contextText').textContent = CONTEXT[year] || '';
  drawChart();
  buildLegend();
}

function drawChart() {
  const svg = document.getElementById('chart-svg');
  svg.innerHTML = '';

  const data = getYearData(currentYear);
  if (!data.length) return;

  const W = svg.parentElement.clientWidth - 32;
  const H = Math.min(400, Math.max(260, W * 0.45));
  const margin = { top: 10, right: 30, bottom: 36, left: 44 };
  const width = W - margin.left - margin.right;
  const height = H - margin.top - margin.bottom;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('height', H);

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform', `translate(${margin.left},${margin.top})`);
  svg.appendChild(g);

  const allVals = data.flat();
  const yMin = Math.max(0, d3.min(allVals) - 0.15);
  const yMax = d3.max(allVals) + 0.15;

  const xScale = d3.scalePoint().domain(MATURITIES).range([0, width]).padding(0.1);
  const yScale = d3.scaleLinear().domain([yMin, yMax]).range([height, 0]).nice();

  // Grid
  const gridG = document.createElementNS('http://www.w3.org/2000/svg','g');
  gridG.setAttribute('class','grid');
  yScale.ticks(5).forEach(t => {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', 0); line.setAttribute('x2', width);
    line.setAttribute('y1', yScale(t)); line.setAttribute('y2', yScale(t));
    gridG.appendChild(line);
  });
  g.appendChild(gridG);

  // Zero line if inverted
  if (yMin < 0) {
    const zl = document.createElementNS('http://www.w3.org/2000/svg','line');
    zl.setAttribute('class','zero-line');
    zl.setAttribute('x1',0); zl.setAttribute('x2',width);
    zl.setAttribute('y1',yScale(0)); zl.setAttribute('y2',yScale(0));
    g.appendChild(zl);
  }

  // X axis
  const xAxisG = document.createElementNS('http://www.w3.org/2000/svg','g');
  xAxisG.setAttribute('class','axis');
  xAxisG.setAttribute('transform',`translate(0,${height})`);
  const xPath = document.createElementNS('http://www.w3.org/2000/svg','path');
  xPath.setAttribute('d',`M0,0 H${width}`);
  xAxisG.appendChild(xPath);
  MATURITIES.forEach(m => {
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', xScale(m));
    text.setAttribute('y', 20);
    text.setAttribute('text-anchor','middle');
    text.textContent = m;
    xAxisG.appendChild(text);
    const tick = document.createElementNS('http://www.w3.org/2000/svg','line');
    tick.setAttribute('x1', xScale(m)); tick.setAttribute('x2', xScale(m));
    tick.setAttribute('y1', 0); tick.setAttribute('y2', 4);
    tick.setAttribute('stroke','rgba(255,255,255,0.07)');
    xAxisG.appendChild(tick);
  });
  g.appendChild(xAxisG);

  // Y axis
  const yAxisG = document.createElementNS('http://www.w3.org/2000/svg','g');
  yAxisG.setAttribute('class','axis');
  yScale.ticks(5).forEach(t => {
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', -8);
    text.setAttribute('y', yScale(t) + 3);
    text.setAttribute('text-anchor','end');
    text.textContent = t.toFixed(1) + '%';
    yAxisG.appendChild(text);
  });
  g.appendChild(yAxisG);

  const line = d3.line()
    .x((d,i) => xScale(MATURITIES[i]))
    .y(d => yScale(d))
    .curve(d3.curveCatmullRom.alpha(0.5));

  const monthsInYear = data.length;
  const tooltip = document.getElementById('tooltip');

  data.forEach((monthData, mi) => {
    if (hiddenMonths.has(mi)) return;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','yield-line');
    path.setAttribute('d', line(monthData));
    path.setAttribute('stroke', MONTH_COLORS[mi]);
    path.style.filter = 'drop-shadow(0 0 3px ' + MONTH_COLORS[mi] + '44)';

    path.addEventListener('mouseenter', (e) => {
      tooltip.style.opacity = '1';
      let html = `<div class="tooltip-month">${MONTHS[mi]} ${currentYear}</div>`;
      MATURITIES.forEach((mat,i) => {
        html += `<div class="tooltip-row"><span>${mat}</span><span>${monthData[i].toFixed(2)}%</span></div>`;
      });
      tooltip.innerHTML = html;
    });
    path.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });
    path.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });

    g.appendChild(path);
  });
}

function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const data = getYearData(currentYear);
  data.forEach((_, mi) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.style.opacity = hiddenMonths.has(mi) ? '0.35' : '1';
    const swatch = document.createElement('div');
    swatch.className = 'legend-swatch';
    swatch.style.background = MONTH_COLORS[mi];
    const label = document.createElement('span');
    label.textContent = MONTHS[mi];
    item.appendChild(swatch);
    item.appendChild(label);
    item.onclick = () => {
      if (hiddenMonths.has(mi)) hiddenMonths.delete(mi);
      else hiddenMonths.add(mi);
      drawChart();
      buildLegend();
    };
    legend.appendChild(item);
  });
}

// Init
buildYearNav();
selectYear(2024);

window.addEventListener('resize', () => {
  drawChart();
});
</script>
</body>
